<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pulse Visuals | Double Video Edition</title>
    <style>
        /* 1. ГЛАВНЫЕ НАСТРОЙКИ */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            background-color: #0d0d0d; 
        }

        /* 2. ФОНОВОЕ ВИДЕО (на весь экран) */
        .video-background { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -2; 
            overflow: hidden; 
        }
        .video-background video { 
            min-width: 100%; 
            min-height: 100%; 
            object-fit: cover; 
            filter: brightness(35%) blur(8px); /* Фон стал чуть темнее и мягче */
        }

        /* 3. КОНТЕНТ ПО ЦЕНТРУ */
        .content { 
            z-index: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* НОВЫЙ КОНТЕЙНЕР ДЛЯ YOUTUBE */
        .video-container {
            width: 850px;           /* Увеличенный размер */
            aspect-ratio: 16 / 9;   /* Пропорции YouTube */
            border-radius: 20px;
            overflow: hidden;       /* Магия: обрезает углы видео внутри */
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 40px rgba(74, 14, 143, 0.5);
            margin: 40px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;       /* Черный фон, пока грузится видео */
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* КНОПКИ */
        .link-wrapper { text-decoration: none; }
        .pill { 
            background: linear-gradient(135deg, rgba(26, 1, 54, 0.9) 0%, rgba(46, 2, 89, 0.9) 50%, rgba(26, 1, 54, 0.9) 100%); 
            border: 1px solid rgba(125, 42, 232, 0.6); 
            border-radius: 50px; 
            padding: 15px 50px; 
            color: #e0d1ff; 
            font-size: 14px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            transition: 0.4s all; 
            cursor: pointer; 
            backdrop-filter: blur(10px); 
        }
        .pill:hover { transform: scale(1.05); border-color: #7d2ae8; color: #ffffff; box-shadow: 0 0 30px rgba(125, 42, 232, 0.4); }

        /* 4. ВРАЩАЮЩЕЕСЯ ЛОГО */
        @keyframes rotate-360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .corner-logo { 
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 70px; 
            z-index: 100; 
            opacity: 0.8; 
            animation: rotate-360 10s linear infinite; 
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay loop muted playsinline>
            <source src="https://v1.pinimg.com/videos/mc/expMp4/79/43/26/794326873cc07879bef5828449d374a5_t1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content">
        
        <a href="https://pulsevisuals.pro/" target="_blank" class="link-wrapper">

        </a>

        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/0XMJi4VXB1U?rel=0&autoplay=0"
